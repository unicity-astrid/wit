name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  wit-immutability:
    name: WIT frozen-file immutability
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine base ref
        id: base
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD~1" >> "$GITHUB_OUTPUT"
          fi

      - name: Check frozen-file immutability
        run: scripts/lint-wit-immutability.sh ${{ steps.base.outputs.ref }}

  wit-parses:
    name: WIT files parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install wasm-tools
        run: cargo install --locked wasm-tools

      - name: Parse every host/*.wit file
        # Only host/ — each host package is self-contained (no cross-package
        # `use`), so single-file mode works. interfaces/ files cross-reference
        # each other (e.g. `use astrid:types/types.{...}`) and would require a
        # deps/ tree to resolve; they predate this CI and are validated by
        # downstream SDK builds.
        run: |
          fail=0
          for f in host/*.wit; do
            if wasm-tools component wit "$f" >/dev/null 2>&1; then
              echo "OK:   $f"
            else
              echo "FAIL: $f"
              wasm-tools component wit "$f" 2>&1 | head -20
              fail=1
            fi
          done
          exit $fail
